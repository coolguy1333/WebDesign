<!DOCTYPE html>
<html>
    <head>
        <title>Minecraft Server Application</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <h1>Minecraft Server Application</h1>
            <p style="font-size: 16px; font-weight: normal;">Fill this out to join the world!</p>
            <br><br>
        </header>
        <main>
            <form id="mcApplication">
                <p>Minecraft Username:</p>
                <label for="mcUsername">
                    <input type="text" id="mcUsername" placeholder= "ex. Steve123" required>
                </label>
                <br><br>
                

                <p>What is your experience level?</p>
                <label for="expLevel">
                <select id="expLevel">
                    <option>Newbie (WHY HAVE I BEEN MISSING THIS MY ENTIRE LIFE)</option>
                    <option>Casual (I how to make a crafting table)</option>
                    <option>Casual+ (I know how to craft 64 blocks at once)</option>
                    <option>Pro (I'm a sweat)</option>
                    <option>Hermit (I have no life)</option>
                </select>
                </label>
                <br><br>

                <p>What is your preferred playstyle?</p>
                <input type="radio" id="survival" name="playstyle" value="survival">
                <label for="survival">Survival / Building</label><br>                    
                <input type="radio" id="pvp" name="playstyle" value="pvp">
                <label for="pvp">PvP / Combat</label><br>
                <input type="radio" id="creative" name="playstyle" value="creative">
                <label for="creative">Creative Mode Only</label>
                <br><br>

                <p>Select your skills:</p>
                <input type="checkbox" id="redstone" name="skills">
                <label for="redstone">Redstone Engineering</label><br>
                <input type="checkbox" id="building" name="skills">
                <label for="building">Interior Design/Building</label><br>         
                <input type="checkbox" id="farming" name="skills">
                <label for="farming">Auto-Farming</label><br>
                <input type="checkbox" id="mining" name="skills">
                <label for="mining">Strip Mining</label>
                <br><br>

                <button type="submit">Submit Application</button>
                <br><br>
            </form>

            <p id="resultParagraph" style="font-size:32px; font-weight:bold;"></p>

        </main>
        <script src="index.js"></script>
    </body>
</html>
